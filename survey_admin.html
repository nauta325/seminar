<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설문 결과 — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #2c3e5d;
  --coral: #c0573e;
  --cream: #fdfcf9;
  --border: #e0d8cc;
  --text: #1a1a1a;
  --muted: #6b6560;
  --green: #2d6a4f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f0ece4; font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--text); }

/* LOGIN */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px 36px;
  width: 320px;
  text-align: center;
}
.login-title { font-size: 20px; font-weight: 900; color: var(--navy); margin-bottom: 6px; }
.login-sub { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
.login-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Noto Sans KR', sans-serif;
  margin-bottom: 12px;
  text-align: center;
  letter-spacing: 4px;
}
.login-input:focus { outline: none; border-color: var(--navy); }
.login-btn {
  width: 100%;
  padding: 13px;
  background: var(--navy);
  color: white;
  font-weight: 800;
  font-size: 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.login-btn:hover { background: var(--coral); }
.login-err { font-size: 12px; color: var(--coral); margin-top: 8px; display: none; }

/* DASHBOARD */
.dashboard { display: none; }
.topbar {
  background: var(--navy);
  color: white;
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; }
.topbar-count { font-size: 13px; color: rgba(255,255,255,0.6); }
.topbar-refresh {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
}
.topbar-refresh:hover { background: rgba(255,255,255,0.2); }

.content { max-width: 900px; margin: 0 auto; padding: 28px 20px 60px; }

/* STAT CARDS */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
.stat-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
}
.stat-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: var(--navy); letter-spacing: 1px; line-height: 1; }
.stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* CHART SECTION */
.section { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; margin-bottom: 20px; }
.sec-title { font-size: 14px; font-weight: 900; color: var(--navy); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bar-label { font-size: 13px; color: var(--text); min-width: 200px; flex-shrink: 0; }
.bar-track { flex: 1; height: 20px; background: #f0ece4; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.bar-fill.navy { background: var(--navy); }
.bar-fill.coral { background: var(--coral); }
.bar-fill.green { background: var(--green); }
.bar-count { font-size: 12px; font-weight: 800; color: var(--muted); min-width: 30px; text-align: right; }

/* RESPONSE LIST */
.resp-list { display: flex; flex-direction: column; gap: 12px; }
.resp-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  background: var(--cream);
}
.resp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.resp-name { font-weight: 800; font-size: 14px; }
.resp-date { font-size: 11px; color: var(--muted); }
.resp-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 700;
}
.tag-navy { background: rgba(44,62,93,0.1); color: var(--navy); }
.tag-coral { background: rgba(192,87,62,0.1); color: var(--coral); }
.tag-green { background: rgba(45,106,79,0.1); color: var(--green); }
.resp-free { font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; font-style: italic; }

.empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
.loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-title">🔒 관리자</div>
    <div class="login-sub">설문 결과 확인 페이지</div>
    <input type="password" class="login-input" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">확인</button>
    <div class="login-err" id="loginErr">비밀번호가 틀렸어요</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-title">설문 결과 대시보드</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="topbar-count" id="totalCount">불러오는 중...</div>
      <button class="topbar-refresh" onclick="loadData()">↻ 새로고침</button>
    </div>
  </div>

  <div class="content">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">총 응답</div>
        <div class="stat-num" id="s1">-</div>
        <div class="stat-sub">명</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">1위 주제</div>
        <div class="stat-num" style="font-size:22px;line-height:1.3;" id="s2">-</div>
        <div class="stat-sub" id="s2sub"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">선호 방식</div>
        <div class="stat-num" style="font-size:22px;line-height:1.3;" id="s3">-</div>
        <div class="stat-sub" id="s3sub"></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">📊 Q1 — 시간 낭비 작업 (복수 응답)</div>
      <div id="q1Chart"><div class="loading">불러오는 중...</div></div>
    </div>

    <div class="section">
      <div class="sec-title">🎯 Q2 — 다음 세미나 주제</div>
      <div id="q2Chart"><div class="loading">불러오는 중...</div></div>
    </div>

    <div class="section">
      <div class="sec-title">💻 Q3 — 선호 방식</div>
      <div id="q3Chart"><div class="loading">불러오는 중...</div></div>
    </div>

    <div class="section">
      <div class="sec-title">📝 전체 응답 목록</div>
      <div class="resp-list" id="respList"><div class="loading">불러오는 중...</div></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ypxkkzusllgwekdehmlp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzZXBmdHFra3Zsa2lrZ3FoY3liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTk1MDksImV4cCI6MjA5MzQzNTUwOX0.MpcsmzaEzCmMJPovv9s-DLChQrTrPxbPoT4r3gGvMOs';
const ADMIN_PW = '0502';

function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/seminar_survey?select=*&order=submitted_at.desc`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('respList').innerHTML = '<div class="empty">데이터를 불러오지 못했어요 😢</div>';
  }
}

function count(data, key, val) {
  return data.filter(r => {
    if (Array.isArray(r[key])) return r[key].includes(val);
    return r[key] === val;
  }).length;
}

function makeBar(label, n, total, colorClass) {
  const pct = total > 0 ? Math.round(n / total * 100) : 0;
  return `<div class="bar-row">
    <div class="bar-label">${label}</div>
    <div class="bar-track"><div class="bar-fill ${colorClass}" style="width:${pct}%"></div></div>
    <div class="bar-count">${n}명</div>
  </div>`;
}

function render(data) {
  const total = data.length;
  document.getElementById('totalCount').textContent = `총 ${total}명 응답`;
  document.getElementById('s1').textContent = total;

  // Q1
  const q1Items = [
    '학부모 카톡·메시지 응대',
    '월말평가서·학습 보고서 작성',
    '시험지 분석·시험 대비 자료 만들기',
    '외부지문 분석·문제 만들기',
    '수업 자료·과제 만들기',
    '신규생 상담·레벨테스트 정리',
    '수강료·교재비 관리',
  ];
  const q1counts = q1Items.map(v => ({ v, n: count(data, 'q1_painpoints', v) }));
  q1counts.sort((a,b) => b.n - a.n);
  document.getElementById('q1Chart').innerHTML = q1counts.map(({v,n}) =>
    makeBar(v, n, total, 'navy')).join('') || '<div class="empty">응답 없음</div>';

  // Q2
  const q2Items = [
    '월말평가서 자동화',
    '학부모 커뮤니케이션 자동화',
    '시험지 분석·내신 대비 자료 자동화',
    '웹앱 만들기',
  ];
  const q2counts = q2Items.map(v => ({ v, n: count(data, 'q2_topic', v) }));
  q2counts.sort((a,b) => b.n - a.n);
  document.getElementById('q2Chart').innerHTML = q2counts.map(({v,n}) =>
    makeBar(v, n, total, 'coral')).join('') || '<div class="empty">응답 없음</div>';
  if (q2counts[0]?.n > 0) {
    document.getElementById('s2').textContent = q2counts[0].v.split(' ')[0];
    document.getElementById('s2sub').textContent = `${q2counts[0].n}명 선택`;
  }

  // Q3
  const q3Items = ['줌 (온라인)', '오프라인 일산', '둘 다 좋아요'];
  const q3counts = q3Items.map(v => ({ v, n: count(data, 'q3_format', v) }));
  q3counts.sort((a,b) => b.n - a.n);
  document.getElementById('q3Chart').innerHTML = q3counts.map(({v,n}) =>
    makeBar(v, n, total, 'green')).join('') || '<div class="empty">응답 없음</div>';
  if (q3counts[0]?.n > 0) {
    document.getElementById('s3').textContent = q3counts[0].v;
    document.getElementById('s3sub').textContent = `${q3counts[0].n}명`;
  }

  // 응답 목록
  if (data.length === 0) {
    document.getElementById('respList').innerHTML = '<div class="empty">아직 응답이 없어요</div>';
    return;
  }
  document.getElementById('respList').innerHTML = data.map(r => {
    const date = new Date(r.submitted_at).toLocaleString('ko-KR', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const painTags = (r.q1_painpoints||[]).map(v => `<span class="tag tag-navy">${v}</span>`).join('');
    return `<div class="resp-card">
      <div class="resp-header">
        <div class="resp-name">${r.name}</div>
        <div class="resp-date">${date}</div>
      </div>
      <div class="resp-tags">${painTags}</div>
      <div class="resp-tags">
        <span class="tag tag-coral">📋 ${r.q2_topic}</span>
        <span class="tag tag-green">💻 ${r.q3_format}</span>
      </div>
      ${r.q4_freetext ? `<div class="resp-free">"${r.q4_freetext}"</div>` : ''}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
